<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR and Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>OCR and Translator</h1>
    
        <!-- Drag and Drop Section -->
 
<form class="form">
    <label style="margin-left: 675px;">
        <input type="checkbox" id="handwriting-toggle"> Enable Handwriting Recognition
    </label><br>
    
    
  <span class="form-title">Upload your file</span>
  <p class="form-paragraph">
      File should be an image
    </p>
    
   <label for="file-input" class="drop-container">
  <span class="drop-title">Drop files here</span>
  or
  <!-- Image upload and preview section -->
<div class="image-upload-container">
    <input type="file" id="file-input" accept="image/*" multiple >
    <div class="image-preview-container">
        <img id="image-preview" src="" alt="Image Preview" class="hidden" />
        
        <p id="image-name"></p><br>
        <div class="image-controls hidden">
            
            <button id="reset-image">Reset</button>
        </div>  
    </div>
</div>

</label>
</form>



        <!-- Display OCR Result -->
        <div id="ocr-result" class="result-section">
            <h2>Extracted Text</h2>
            <pre id="detected-text">No text detected.</pre>
            <p id="detected-language">No language detected.</p>

            <button class="copyBtn" data-target="detected-text">Copy</button>

        </div>
    
        <!-- Translation Section -->
        <div class="translate-section">
            <label for="language-select">Select Language to Translate:</label>
            <select id="language-select">
                <!-- Indian Languages -->
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="kn">Kannada</option>
                <option value="ta">Tamil</option>
                <option value="te">Telugu</option>
                <option value="ml">Malayalam</option>
                <option value="mr">Marathi</option>
                <option value="gu">Gujarati</option>
                <option value="bn">Bengali</option>
                <option value="pa">Punjabi</option>
                <option value="ur">Urdu</option>
            
                <!-- Popular Global Languages -->
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="zh-cn">Chinese (Simplified)</option>
                <option value="zh-tw">Chinese (Traditional)</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ru">Russian</option>
                <option value="ar">Arabic</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
            </select>
            
            <button id="translate-btn" class="btn btn-2">Translate</button>
        </div>
    
        <!-- Display Translated Text -->
        <div id="translated-result" class="result-section">
            <h2>Translated Text</h2>
            <pre id="translated-text">No translation available.</pre>
            <button class="copyBtn" id="copyTranslatedTextBtn">Copy</button>
        </div>
    
        <!-- Error Message -->
        <div id="error-message"></div>
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
